# ──────────────────────────────────────────────
# DEV environment profile
# Activated with: spring.profiles.active=dev
# ──────────────────────────────────────────────

app:
  environment: ${ENVIRONMENT_NAME:dev}

spring:
  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:4}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}

logging:
  level:
    root: INFO
    com.nagp.catalog: DEBUG
    org.springframework.web: DEBUG
