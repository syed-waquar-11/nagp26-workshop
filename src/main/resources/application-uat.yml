# ──────────────────────────────────────────────
# UAT environment profile
# Activated with: spring.profiles.active=uat
# ──────────────────────────────────────────────

app:
  environment: ${ENVIRONMENT_NAME:uat}

spring:
  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:8}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}

logging:
  level:
    root: INFO
    com.nagp.catalog: INFO
