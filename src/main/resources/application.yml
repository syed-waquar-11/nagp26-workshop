# ──────────────────────────────────────────────
# Catalog API — base configuration
# Environment-specific overrides are in:
#   application-dev.yml  (spring.profiles.active=dev)
#   application-sit.yml  (spring.profiles.active=sit)
#   application-uat.yml  (spring.profiles.active=uat)
#   application-prod.yml (spring.profiles.active=prod)
#
# All sensitive values are injected via environment
# variables from Kubernetes Secrets.
# ──────────────────────────────────────────────

app:
  environment: ${ENVIRONMENT_NAME:local}

spring:
  application:
    name: catalog-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:catalogdb}}
    username: ${DB_USERNAME:catalog_user}
    password: ${DB_PASSWORD:catalog_pass}
    hikari:
      pool-name: catalog-api-pool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  sql:
    init:
      mode: never
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  shutdown: graceful

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  metrics:
    tags:
      application: ${spring.application.name}

info:
  app:
    name: catalog-api
    description: NAGP Kubernetes multi-tier assignment API
    version: 0.0.1-SNAPSHOT
    java:
      version: 21
    spring-boot:
      version: 3.5.15
  env:
    environment: ${app.environment:local}
