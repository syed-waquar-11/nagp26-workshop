# ──────────────────────────────────────────────
# SIT environment profile
# Activated with: spring.profiles.active=sit
# ──────────────────────────────────────────────

app:
  environment: ${ENVIRONMENT_NAME:sit}

spring:
  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:6}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}

logging:
  level:
    root: INFO
    com.nagp.catalog: DEBUG
